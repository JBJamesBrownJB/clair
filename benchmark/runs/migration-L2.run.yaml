id: migration-L2-armA
description: >-
  Migration-concurrent flagship: the 3 feature slices PLUS the Dependabot-remediation and
  framework-major-upgrade maintenance slices, running concurrently. Maximal cross-cutting churn.
  Disciplined-isolation control, local worktrees.
status: ready

base:
  branch: arena/base
  sha: 1a5cd3d            # arena-base-v1

gate:
  branch: arena/reference
  sha: bfa46b5            # arena-reference-v1
  command: pnpm test:gate # + bash gate/run-gate.sh

arm: A                    # disciplined isolation (clair plugin disabled)
topology: local-worktrees # locked — Scenario 2
level: L2

slices:
  - { id: S1, title: "Authz hardening + role-management",        backlog: [F-08, F-10, F-09] }
  - { id: S2, title: "Saved views: multi-field search + filter", backlog: [F-06, F-07, F-12, F-13, F-15] }
  - { id: S3, title: "Export (CSV + JSON)",                      backlog: [F-17] }
  - { id: S4, title: "Dependabot remediation batch",             backlog: [M-02, M-03, M-04] }
  - { id: S5, title: "Framework major upgrade (Router v6->v7 + Query v4->v5)", backlog: [M-10, M-05] }
agents: 5

information_asymmetry: true

model: claude-opus-4-8
temperature: 0

budget:
  max_tokens_per_agent: 6000000   # recalibrated for cache-inclusive tokens (build agents observed ~1.7-3M tok / 37-68 turns; turns are the real bound)
  max_turns_per_agent: 120

integration:
  mode: mechanical                # held fixed + identical across arms

trials:
  k: 5

metrics:
  - all-pass-rate
  - semantic-conflict-rate
  - tsc-clean
  - build-clean
  - rcc
  - rework-tokens
  - cost-to-all-pass
  - wall-clock
  # textual-conflicts intentionally OMITTED as a signal: ≈100% in both arms (shared lockfile + framework sweep)
