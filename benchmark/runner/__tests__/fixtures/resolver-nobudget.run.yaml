id: test-resolver-nobudget-armA
description: >-
  Test fixture — resolver mode without a resolver_budget block.
  Used to verify that dry-run labels the integration mode as 'resolver'
  even when no resolver_budget is configured.
status: ready

base:
  branch: arena/base
  sha: 1a5cd3d

gate:
  branch: arena/reference
  sha: bfa46b5
  command: pnpm test:gate

arm: A
topology: local-worktrees
level: L1

slices:
  - { id: S1, title: "Authz hardening + role-management",       backlog: [F-08, F-10, F-09] }
  - { id: S2, title: "Saved views: multi-field search + filter", backlog: [F-06, F-07, F-12, F-13, F-15] }
  - { id: S3, title: "Export (CSV + JSON)",                      backlog: [F-17] }
agents: 3

information_asymmetry: true

model: claude-opus-4-8
temperature: 0

budget:
  max_tokens_per_agent: 1500000
  max_turns_per_agent: 120

integration:
  mode: resolver
  # No resolver_budget — intentional; tests the edge case where mode=resolver but no budget is set

trials:
  k: 5

metrics:
  - all-pass-rate
