id: test-pr-queue-armA
description: >-
  Test fixture — pr-queue integration mode.
  Used to verify that the pr-queue pipeline is wired correctly.
status: ready

base:
  branch: arena/base
  sha: 1a5cd3d

gate:
  branch: arena/reference
  sha: bfa46b5
  command: pnpm test:gate

arm: A
topology: local-worktrees
level: L1

slices:
  - { id: S1, title: "Authz hardening + role-management",        backlog: [F-08, F-10, F-09] }
  - { id: S2, title: "Saved views: multi-field search + filter",  backlog: [F-06, F-07, F-12, F-13, F-15] }
  - { id: S3, title: "Export (CSV + JSON)",                       backlog: [F-17] }
agents: 3

information_asymmetry: true

model: claude-opus-4-8
temperature: 0

budget:
  max_tokens_per_agent: 1500000
  max_turns_per_agent: 120

integration:
  mode: pr-queue
  queue_budget:
    max_tokens: 2000000
    max_turns: 200

trials:
  k: 5

metrics:
  - all-pass-rate
  - semantic-conflict-rate
  - tsc-clean
  - build-clean
  - rcc
  - textual-conflicts
  - rework-tokens
  - wall-clock
  - cost-to-success
  - test-discipline
